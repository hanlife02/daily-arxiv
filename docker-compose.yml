services:
  app:
    build: .
    command: pnpm start
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://daily_arxiv:daily_arxiv@postgres:5432/daily_arxiv
      - REDIS_URL=redis://redis:6379
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    ports:
      - "3211:3000"
    volumes:
      - ./data/app:/app/data/app

  worker:
    build: .
    command: pnpm worker
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://daily_arxiv:daily_arxiv@postgres:5432/daily_arxiv
      - REDIS_URL=redis://redis:6379
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    volumes:
      - ./data/app:/app/data/app
      - ./data/backups:/app/data/backups

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daily_arxiv
      POSTGRES_USER: daily_arxiv
      POSTGRES_PASSWORD: daily_arxiv
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daily_arxiv -d daily_arxiv"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
